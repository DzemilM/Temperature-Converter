<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card">
    <h1>Temperature Converter</h1>
    <p class="subtitle">Enter the temperature, select units and submit</p>

    <form id="converter" class="controls">
      <input
        type="number"
        id="value"
        class="field"
        placeholder="0.00"
        step="any"
      />

      <select id="from" class="field">
        <option value="" disabled selected>From Unit</option>
        <option value="celsius">Celsius</option>
        <option value="fahrenheit">Fahrenheit</option>
        <option value="kelvin">Kelvin</option>
      </select>

      <select id="to" class="field">
        <option value="" disabled selected>To Unit</option>
        <option value="celsius">Celsius</option>
        <option value="fahrenheit">Fahrenheit</option>
        <option value="kelvin">Kelvin</option>
      </select>

      <button type="submit" id="convert" class="convert" disabled>Convert</button>
    </form>

    <p id="result" class="result"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
